name: Apply Resume Refine branding

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/apply_resume_refine.py
      - .github/workflows/apply_resume_refine.yml

permissions:
  contents: write

jobs:
  migrate-and-verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Apply branding and disclosure changes
        run: python .github/apply_resume_refine.py

      - name: Commit transformed application changes to pull request branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app backend settings.gradle.kts .idea/.name
          if git diff --cached --quiet; then
            echo "No application changes to commit."
          else
            git commit -m "Rename app to Resume Refine and clarify AI processing"
            git push origin HEAD:${{ github.event.pull_request.head.ref }}
          fi

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew test

      - name: Run Android lint
        run: ./gradlew lint
