name: Verify Resume Refine build

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/apply_resume_refine.py
      - .github/workflows/apply_resume_refine.yml

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Build debug APK and capture output
        id: build
        continue-on-error: true
        run: |
          chmod +x gradlew
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace 2>&1 | tee build_failure.log

      - name: Run unit tests
        if: steps.build.outcome == 'success'
        run: ./gradlew test

      - name: Run Android lint
        if: steps.build.outcome == 'success'
        run: ./gradlew lint

      - name: Commit build failure log to pull request branch
        if: steps.build.outcome != 'success'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f build_failure.log
          git commit -m "Capture Resume Refine build failure"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Fail workflow when build failed
        if: steps.build.outcome != 'success'
        run: exit 1
