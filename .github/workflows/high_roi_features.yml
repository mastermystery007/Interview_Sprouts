name: Verify high ROI features

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/high_roi_features.yml

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: direct/high-roi-features

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Apply report integration
        run: python .github/apply_high_roi_report.py

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Run unit tests
        run: ./gradlew test

      - name: Run Android lint
        run: ./gradlew lint

      - name: Commit verified changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Implement evidence matching and report sharing"
          git push origin HEAD:refs/heads/direct/high-roi-features
