name: Apply remaining fixes

# One-time workflow: remove after applying the source changes.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply_remaining_fixes.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/final-fixes-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Apply source changes
        run: python .github/apply_remaining_fixes.py

      - name: Commit changes
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply remaining report and input UX fixes"
          git push origin HEAD:"$TARGET_BRANCH"

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Run tests
        run: ./gradlew test

      - name: Run lint
        run: ./gradlew lint
