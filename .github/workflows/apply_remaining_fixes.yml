name: Apply remaining fixes

# One-time workflow. It is deleted after the verified changes reach main.
on:
  push:
    branches:
      - direct/apply-final-fixes-v2
    paths:
      - .github/final-fixes-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out one-time branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: direct/apply-final-fixes-v2

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Apply verified source transformation
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/apply_remaining_fixes.py')
          text = path.read_text(encoding='utf-8')

          old_helper = 'updated, count = re.subn(pattern, replacement, text, count=expected, flags=re.DOTALL)'
          new_helper = 'updated, count = re.subn(pattern, lambda _: replacement, text, count=expected, flags=re.DOTALL)'
          if old_helper not in text:
              raise SystemExit('Expected replace_regex implementation not found')
          text = text.replace(old_helper, new_helper, 1)

          old_xml = '''layout_report = replace_regex(
              layout_report,
              r'(<TextView\\s+android:id="@\\+id/textScoreValue"[\\s\\S]*?android:textSize=")20sp(")',
              r'\\g<1>16sp\\g<2>',
              "score label XML size"
          )'''
          new_xml = '''layout_report, score_size_count = re.subn(
              r'(<TextView\\s+android:id="@\\+id/textScoreValue"[\\s\\S]*?android:textSize=")20sp(")',
              lambda match: f'{match.group(1)}16sp{match.group(2)}',
              layout_report,
              count=1,
              flags=re.DOTALL,
          )
          if score_size_count != 1:
              raise RuntimeError(f"score label XML size: expected 1 match, found {score_size_count}")'''
          if old_xml not in text:
              raise SystemExit('Expected score XML replacement block not found')
          text = text.replace(old_xml, new_xml, 1)

          path.write_text(text, encoding='utf-8')
          PY
          python .github/apply_remaining_fixes.py

      - name: Preserve workflow and commit source changes
        run: |
          git restore .github/workflows/apply_remaining_fixes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply remaining report and input UX fixes"
          git push origin HEAD:refs/heads/direct/apply-final-fixes-v2

      - name: Build debug APK
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Run tests
        run: ./gradlew test

      - name: Run lint
        run: ./gradlew lint
