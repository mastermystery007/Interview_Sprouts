name: Apply remaining fixes

# One-time workflow: remove after applying the source changes.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply_remaining_fixes.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/final-fixes-trigger.txt

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Apply source changes
        id: apply_fixes
        continue-on-error: true
        run: |
          python .github/apply_remaining_fixes.py > /tmp/fix-output.log 2>&1
          status=$?
          cat /tmp/fix-output.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit failure details
        if: steps.apply_fixes.outputs.status != '0'
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          git restore --worktree --staged .
          git clean -fd
          mkdir -p .github
          cp /tmp/fix-output.log .github/fix-output.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/fix-output.log
          git commit -m "Capture remaining fixes script failure"
          git push origin HEAD:"$TARGET_BRANCH"
          exit 1

      - name: Commit changes
        if: steps.apply_fixes.outputs.status == '0'
        env:
          TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Apply remaining report and input UX fixes"
          git push origin HEAD:"$TARGET_BRANCH"

      - name: Build debug APK
        if: steps.apply_fixes.outputs.status == '0'
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Run tests
        if: steps.apply_fixes.outputs.status == '0'
        run: ./gradlew test

      - name: Run lint
        if: steps.apply_fixes.outputs.status == '0'
        run: ./gradlew lint
