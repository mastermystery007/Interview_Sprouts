name: Apply remaining fixes

# One-time workflow: remove after applying the source changes.
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply_remaining_fixes.yml
  pull_request:
    branches:
      - main
    paths:
      - .github/final-fixes-trigger.txt

permissions:
  contents: read

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: direct/apply-final-fixes

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Apply source changes
        id: apply_fixes
        run: |
          set +e
          python .github/apply_remaining_fixes.py > /tmp/fix-output.log 2>&1
          status=$?
          set -e
          cat /tmp/fix-output.log
          echo "status=$status" >> "$GITHUB_OUTPUT"

      - name: Upload source and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-fixes-diagnostics
          if-no-files-found: error
          path: |
            app/src/main/java/com/example/interviewsprouts/ResumeReportActivity.kt
            app/src/main/java/com/example/interviewsprouts/ResumeInputActivity.kt
            app/src/main/res/layout/activity_resume_report.xml
            app/src/main/res/layout/activity_resume_input.xml
            .idea/planningMode.xml
            /tmp/fix-output.log

      - name: Build debug APK
        if: steps.apply_fixes.outputs.status == '0'
        run: |
          chmod +x gradlew
          ./gradlew clean assembleDebug --stacktrace

      - name: Run tests
        if: steps.apply_fixes.outputs.status == '0'
        run: ./gradlew test

      - name: Run lint
        if: steps.apply_fixes.outputs.status == '0'
        run: ./gradlew lint

      - name: Fail if source transformation failed
        if: steps.apply_fixes.outputs.status != '0'
        run: exit 1
